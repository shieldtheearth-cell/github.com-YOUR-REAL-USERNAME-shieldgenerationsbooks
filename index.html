<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shield Generations Books</title><style>body{  font-family:Arial;  margin:0;  background:#0f172a;  color:white;}/* HEADER */.header img{  width:100%;  height:auto;  display:block;}/* MAIN AREA */.container{  padding:20px;  margin-right:290px; /* desktop space for cart */}.grid{  display:grid;  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));  gap:20px;}.card{  background:#020617;  padding:15px;  border-radius:10px;}.card img{  width:100%;  height:auto;  border-radius:10px;}.btn{  background:#f59e0b;  color:white;  padding:12px;  border:none;  cursor:pointer;  margin-top:10px;  width:100%;  display:block;  text-align:center;  text-decoration:none;  border-radius:6px;}/* CART DESKTOP */#cart{  position:fixed;  right:0;  top:0;  width:260px;  height:100%;  background:#020617;  padding:15px;  overflow:auto;}/* MOBILE LAYOUT */@media (max-width:768px){  .container{    margin-right:0;    padding:15px;  }  #cart{    position:relative;    width:100%;    height:auto;    top:0;    right:0;    box-sizing:border-box;    margin-bottom:20px;  }  .grid{    grid-template-columns:1fr;  }  .card{    width:100%;  }  h2{    font-size:32px;  }  .btn{    font-size:18px;  }}</style></head><body><!-- HEADER --><div class="header">  <img src="banner.png"></div><!-- CART --><div id="cart"><h3>Cart</h3><ul id="cartItems"></ul><p>Total €<span id="total">0</span></p><a id="paypalBtn" href="https://paypal.me/CharmaineToscano" target="_blank" class="btn">Checkout with PayPal</a></div><!-- SHOP --><div class="container"><h2>Books</h2><div class="grid"><div class="card"><img src="nocturnal.jpg"><h3>Nocturnal</h3><p>€14.99</p><button class="btn" onclick="addToCart('Nocturnal',14.99)">Add</button></div><div class="card"><img src="ocean life.jpg"><h3>Ocean Life</h3><p>€14.99</p><button class="btn" onclick="addToCart('Ocean Life',14.99)">Add</button></div><div class="card"><img src="wildlife.jpg"><h3>Wildlife</h3><p>€14.99</p><button class="btn" onclick="addToCart('Wildlife',14.99)">Add</button></div><div class="card"><img src="farm yard.jpg"><h3>Farm Yard</h3><p>€14.99</p><button class="btn" onclick="addToCart('Farm Yard',14.99)">Add</button></div><div class="card"><img src="Transport through time.jpg"><h3>Transport</h3><p>€14.99</p><button class="btn" onclick="addToCart('Transport',14.99)">Add</button></div><div class="card"><img src="inventions and inventors.jpg"><h3>Inventors</h3><p>€14.99</p><button class="btn" onclick="addToCart('Inventors',14.99)">Add</button></div><div class="card"><img src="wonders of the world .jpg"><h3>Wonders</h3><p>€14.99</p><button class="btn" onclick="addToCart('Wonders',14.99)">Add</button></div></div></div><script>let cart = [];function addToCart(name, price){  cart.push({name, price});  updateCart();}function updateCart(){  let list = document.getElementById("cartItems");  list.innerHTML = "";  let total = 0;  cart.forEach(item=>{    let li = document.createElement("li");    li.textContent = item.name + " €" + item.price.toFixed(2);    list.appendChild(li);    total += item.price;  });  document.getElementById("total").textContent = total.toFixed(2);}</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shield Generations Books</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header img{
  width:100%;
  display:block;
}

/* PAGE LAYOUT */
.wrapper{
  display:flex;
  align-items:flex-start;
}

/* SHOP */
.container{
  flex:1;
  padding:20px;
}

.container h2{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#020617;
  padding:15px;
  border-radius:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin-top:10px;
}

.card p{
  margin-top:8px;
}

.btn{
  background:#f59e0b;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  margin-top:10px;
  border-radius:6px;
  cursor:pointer;
  text-decoration:none;
  display:block;
  text-align:center;
}

/* CART */
#cart{
  width:280px;
  background:#020617;
  padding:20px;
  min-height:100vh;
}

#cart h3{
  margin-bottom:15px;
}

#cart ul{
  list-style:none;
  margin-bottom:15px;
}

#cart li{
  margin-bottom:8px;
  font-size:14px;
}

/* MOBILE */
@media (max-width:768px){

  .wrapper{
    flex-direction:column;
  }

  #cart{
    width:100%;
    min-height:auto;
  }

  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="banner.png" alt="Shield Generations Books Banner">
</div>

<div class="wrapper">

<!-- SHOP -->
<div class="container">

<h2>Books</h2>

<div class="grid">

<div class="card">
<img src="nocturnal.jpg">
<h3>Nocturnal</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Nocturnal',14.99)">Add</button>
</div>

<div class="card">
<img src="ocean life.jpg">
<h3>Ocean Life</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Ocean Life',14.99)">Add</button>
</div>

<div class="card">
<img src="wildlife.jpg">
<h3>Wildlife</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Wildlife',14.99)">Add</button>
</div>

<div class="card">
<img src="farm yard.jpg">
<h3>Farm Yard</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Farm Yard',14.99)">Add</button>
</div>

<div class="card">
<img src="Transport through time.jpg">
<h3>Transport</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Transport',14.99)">Add</button>
</div>

<div class="card">
<img src="inventions and inventors.jpg">
<h3>Inventors</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Inventors',14.99)">Add</button>
</div>

<div class="card">
<img src="wonders of the world .jpg">
<h3>Wonders</h3>
<p>€14.99</p>
<button class="btn" onclick="addToCart('Wonders',14.99)">Add</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart">

<h3>Cart</h3>

<ul id="cartItems"></ul>

<p>Total €<span id="total">0.00</span></p>

<br>

<a
href="https://paypal.me/CharmaineToscano"
target="_blank"
class="btn">
Checkout with PayPal
</a>

<br>

<p style="font-size:14px; line-height:1.5;">
Payment sent to:<br>
Charmaine Toscano
</p>

</div>

</div>

<script>
let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){

  let cartItems = document.getElementById("cartItems");
  let total = 0;

  cartItems.innerHTML = "";

  cart.forEach(item => {

    let li = document.createElement("li");
    li.textContent = item.name + " €" + item.price.toFixed(2);

    cartItems.appendChild(li);

    total += item.price;

  });

  document.getElementById("total").textContent = total.toFixed(2);
}
</script>

</body>
</html>

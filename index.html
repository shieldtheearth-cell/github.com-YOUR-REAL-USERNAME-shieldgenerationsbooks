<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield Generations Books</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      position: relative;
      height: 300px;
      background: url('banner.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }

    header .hero {
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      color: #cbd5f5;
    }

    .layout {
      display: flex;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    h2 {
      color: #f59e0b;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: #020617;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #78350f;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #111;
    }

    .card-content {
      padding: 15px;
      flex: 1;
    }

    .price {
      margin: 10px 0;
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      padding: 10px;
      background: #f59e0b;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    /* CART FIX */
    .cart {
      width: 260px;
      background: #020617;
      border-left: 2px solid #78350f;
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .cart h3 {
      margin-bottom: 10px;
    }

    .checkout {
      margin-top: 20px;
      width: 100%;
      text-align: center;
      display: block;
      padding: 10px;
      background: #f59e0b;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    /* MOBILE FIX */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .cart {
        width: 100%;
        height: auto;
        position: relative;
        border-left: none;
        border-top: 2px solid #78350f;
      }
    }

  </style>
</head>
<body>

<header>
  <div class="hero">
    <h1>Shield Generations Books</h1>
    <p>Learning Through Generations</p>
  </div>
</header>

<div class="layout">

  <div class="main">
    <h2>Animal Series</h2>

    <div class="grid">

      <div class="card">
        <img src="nocturnal.jpg" alt="Nocturnal">
        <div class="card-content">
          <h3>Nocturnal Creatures</h3>
          <div class="price">€14.99</div>
          <a href="#" class="btn">Add to Cart</a>
        </div>
      </div>

      <div class="card">
        <img src="ocean-life.jpg" alt="Ocean">
        <div class="card-content">
          <h3>Ocean Adventures</h3>
          <div class="price">€14.99</div>
          <a href="#" class="btn">Add to Cart</a>
        </div>
      </div>

      <div class="card">
        <img src="wildlife.jpg" alt="Wildlife">
        <div class="card-content">
          <h3>Wildlife</h3>
          <div class="price">€14.99</div>
          <a href="#" class="btn">Add to Cart</a>
        </div>
      </div>

    </div>
  </div>

  <div class="cart">
    <h3>Your Cart</h3>
    <p>Total: €0</p>
    <a href="#" class="checkout">Checkout</a>
  </div>

</div>

</body>
</html>
